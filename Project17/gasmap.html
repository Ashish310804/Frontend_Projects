<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPG Smart Monitor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --primary: #FF0000;
  --bg-dark: #0a0a0a;
  --bg-card: #1a1a1a;
  --text: #ffffff;
  --accent-yellow: #ffcc00;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #1a0000, #330000);
  color: var(--text);
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: black;
  position: sticky;
  top: 0;
  z-index: 1000;
}

nav h1 {
  color: var(--primary);
}

nav ul {
  display: flex;
  list-style: none;
}

nav ul li {
  margin: 0 15px;
}

nav ul li a {
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

nav ul li a:hover {
  color: var(--primary);
  transform: scale(1.1);
}

.container {
  padding: 20px;
}

.card {
  background: var(--bg-card);
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(255,0,0,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

input, button {
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: var(--primary);
  color: white;
  cursor: pointer;
}

button:hover {
  background: var(--accent-yellow);
  color: black;
}

.chatbox {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 300px;
  background: #111;
  border-radius: 12px;
  overflow: hidden;
}

.chat-header {
  background: var(--primary);
  padding: 10px;
}

.chat-body {
  height: 200px;
  overflow-y: auto;
  padding: 10px;
}

.chat-input {
  display: flex;
}

.chat-input input {
  flex: 1;
}

@media(max-width:768px){
  nav ul {
    display: none;
  }
}
</style>
</head>
<body>

<nav>
  <h1><i class="fa-solid fa-fire"></i> LPG Monitor</h1>
  <ul>
    <li><a href="#dashboard">Dashboard</a></li>
    <li><a href="#usage">Usage</a></li>
    <li><a href="#guide">Guide</a></li>
    <li><a href="#manual">Manual Entry</a></li>
  </ul>
</nav>

<div class="container">

<div class="card" id="dashboard">
  <h2>Gas Level</h2>
  <p id="gasLevel">--%</p>
</div>

<div class="card" id="usage">
  <h2>Daily Usage</h2>
  <p id="dailyUsage">-- kg</p>
  <p id="remainingDays">-- days left</p>
</div>

<div class="card" id="manual">
  <h2>Manual Data Input</h2>
  <input type="number" id="pressure" placeholder="Enter Pressure">
  <input type="number" id="weight" placeholder="Enter Cylinder Weight">
  <button onclick="calculate()">Calculate</button>
</div>

<div class="card" id="guide">
  <h2>Usage Guide</h2>
  <ul>
    <li>Always check leakage</li>
    <li>Turn off regulator when not in use</li>
    <li>Monitor pressure daily</li>
    <li>Keep cylinder upright</li>
  </ul>
</div>

</div>

<div class="chatbox">
  <div class="chat-header">Chat Assistant</div>
  <div class="chat-body" id="chatBody"></div>
  <div class="chat-input">
    <input type="text" id="chatInput" placeholder="Ask something...">
    <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
  </div>
</div>

<script>
function calculate(){
  let pressure = document.getElementById('pressure').value;
  let weight = document.getElementById('weight').value;

  let gasLevel = (pressure * 2).toFixed(1);
  let dailyUsage = (weight / 14).toFixed(2);
  let daysLeft = (gasLevel / dailyUsage).toFixed(0);

  document.getElementById('gasLevel').innerText = gasLevel + "%";
  document.getElementById('dailyUsage').innerText = dailyUsage + " kg";
  document.getElementById('remainingDays').innerText = daysLeft + " days";
}

function sendMessage(){
  let input = document.getElementById('chatInput');
  let message = input.value;
  let chatBody = document.getElementById('chatBody');

  chatBody.innerHTML += "<p><b>You:</b> " + message + "</p>";

  let reply = "I can help with LPG usage, safety, and estimation.";

  if(message.toLowerCase().includes('empty')){
    reply = "Your cylinder may last depending on usage shown above.";
  }

  chatBody.innerHTML += "<p><b>Bot:</b> " + reply + "</p>";
  input.value = "";
  chatBody.scrollTop = chatBody.scrollHeight;
}
</script>

</body>
</html>
